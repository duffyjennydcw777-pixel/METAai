name: METAai Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**.py'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx python-dotenv

      - name: Get diff
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.py')
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          LINES=$(echo "$DIFF" | wc -l)
          echo "lines=$LINES" >> $GITHUB_OUTPUT

      - name: Determine complexity level
        id: level
        run: |
          LEVEL=2
          if echo "${{ steps.diff.outputs.diff }}" | grep -qiE "(payment|auth|crypto|secret|password)"; then
            LEVEL=3
          fi
          if [ "${{ steps.diff.outputs.lines }}" -gt 500 ]; then
            LEVEL=3
          fi
          echo "level=$LEVEL" >> $GITHUB_OUTPUT

      - name: Run METAai Review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "${{ steps.diff.outputs.diff }}" | python review.py review --level ${{ steps.level.outputs.level }} --stdin

      - name: Post results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewsDir = 'reviews';
            if (fs.existsSync(reviewsDir)) {
              const files = fs.readdirSync(reviewsDir).sort().reverse();
              const latest = files[0];
              if (latest) {
                const content = fs.readFileSync(`${reviewsDir}/${latest}`, 'utf8');
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `## 🤖 METAai Review\n\n${content.substring(0, 4000)}`
                });
              }
            }
